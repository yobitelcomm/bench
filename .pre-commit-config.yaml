# Pre-commit hooks for InferenceBench Suite.
# Install: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]   # block files >1MB; use Git LFS for bigger
      - id: check-case-conflict
      - id: detect-private-key
      - id: no-commit-to-branch
        args: ["--branch", "main"]   # never commit directly to main

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic~=2.9
          - types-PyYAML
        # Mypy on changed files only — slower checks are in CI
        pass_filenames: false
        args: ["--config-file=pyproject.toml"]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: no-print-statements
        name: No print() in production source
        entry: 'print\('
        language: pygrep
        types: [python]
        exclude: '^(tests/|cli/tests/|envelope/tests/|harness/tests/|.*conftest\.py$|scripts/)'
