name: deploy-pages

# Render the mkdocs documentation site + the static leaderboard and deploy
# both to https://yobitelcomm.github.io/bench/.
#
# Layout on the deployed site:
#   /bench/             -> mkdocs-material documentation (built from docs/)
#   /bench/leaderboard/ -> static leaderboard (built from the marathon corpus)
#
# Triggers:
#   * push to main when leaderboard tool, the docs, mkdocs config, or the
#     published corpus change
#   * workflow_dispatch for manual re-deploys
#   * weekly schedule so the site rebuilds in case the corpus is grown by an
#     out-of-band publisher (e.g. the keyless-sign-marathon workflow uploading
#     to HF — we re-render so the static copies stay aligned).

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "tools/leaderboard/**"
      - "validation-runs/2026-05-18-multi-vendor-marathon/marathon/all/**"
      - "validation-runs/2026-05-25-voice-rtx4000ada/**"
      - "validation-runs/2026-05-29-voice-testbm-h100/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC

permissions:
  contents: read
  pages: write
  id-token: write       # required by actions/deploy-pages

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: render docs + leaderboard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync workspace + docs deps
        run: uv sync --all-packages --dev --group docs --prerelease=allow

      - name: Build mkdocs documentation site
        run: uv run mkdocs build --clean --site-dir _site

      - name: Aggregate published corpus into a single dir
        run: |
          # bench leaderboard --build takes one --envelopes dir; combine all
          # published corpora into a tmp dir first.
          mkdir -p _corpus_combined
          cp validation-runs/2026-05-18-multi-vendor-marathon/marathon/all/*.json _corpus_combined/
          cp validation-runs/2026-05-25-voice-rtx4000ada/*.json _corpus_combined/
          cp validation-runs/2026-05-29-voice-testbm-h100/*.json _corpus_combined/
          echo "envelopes in combined corpus: $(ls _corpus_combined/ | wc -l)"

      - name: Build leaderboard into _site/leaderboard/
        run: |
          uv run bench leaderboard --build \
            --envelopes _corpus_combined \
            --out _site/leaderboard \
            --base-url /bench/leaderboard/

      - name: Smoke-check the rendered site
        run: |
          # Fail fast if either renderer produced an empty site.
          test -f _site/index.html                     # mkdocs index
          test -f _site/leaderboard/index.html         # leaderboard index
          test -f _site/leaderboard/static/site.css    # leaderboard CSS
          test -f _site/leaderboard/data/leaderboard.json
          n_html=$(find _site -name '*.html' | wc -l)
          echo "rendered HTML files: $n_html"
          test "$n_html" -ge 50

      - name: Publish leaderboard.json to HF (decoupled data source)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # The inferencebench.io site reads this committed-data-derived JSON
          # from HF (not GitHub Pages), so Pages can be a pure redirect host.
          if [ -z "$HF_TOKEN" ]; then echo "HF_TOKEN unset — skipping"; exit 0; fi
          uv run python - <<'PY'
          import os
          from huggingface_hub import HfApi
          HfApi(token=os.environ["HF_TOKEN"]).upload_file(
              path_or_fileobj="_site/leaderboard/data/leaderboard.json",
              path_in_repo="leaderboard.json",
              repo_id="Yobitel/marathon-keyless-v0.0.2",
              repo_type="dataset",
              commit_message="refresh built leaderboard.json for inferencebench.io/bench",
          )
          print("published leaderboard.json to HF")
          PY

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # Tell the inferencebench.io site (gpu-inference-calculator) to re-sync the
  # leaderboard data it mirrors from our GitHub Pages. No-ops unless the
  # CALC_DISPATCH_TOKEN secret (a PAT with `repo` scope on the calculator
  # repo) is configured. The site also picks changes up on its 6-hourly cron.
  notify-site:
    name: notify inferencebench.io to refresh
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: repository_dispatch -> calculator repo
        env:
          CALC_DISPATCH_TOKEN: ${{ secrets.CALC_DISPATCH_TOKEN }}
        run: |
          if [ -z "$CALC_DISPATCH_TOKEN" ]; then
            echo "CALC_DISPATCH_TOKEN unset — skipping (site refreshes on its cron)."
            exit 0
          fi
          curl -sS -X POST \
            -H "Authorization: Bearer $CALC_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/yobitelcomm/gpu-inference-calculator/dispatches \
            -d '{"event_type":"bench-corpus-updated"}' \
            -w "dispatch HTTP %{http_code}\n"
