name: deploy-pages

# Render the mkdocs documentation site + the static leaderboard and deploy
# both to https://yobitelcomm.github.io/bench/.
#
# Layout on the deployed site:
#   /bench/             -> mkdocs-material documentation (built from docs/)
#   /bench/leaderboard/ -> static leaderboard (built from the marathon corpus)
#
# Triggers:
#   * push to main when leaderboard tool, the docs, mkdocs config, or the
#     published corpus change
#   * workflow_dispatch for manual re-deploys
#   * weekly schedule so the site rebuilds in case the corpus is grown by an
#     out-of-band publisher (e.g. the keyless-sign-marathon workflow uploading
#     to HF — we re-render so the static copies stay aligned).

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "tools/leaderboard/**"
      - "validation-runs/2026-05-18-multi-vendor-marathon/marathon/all/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC

permissions:
  contents: read
  pages: write
  id-token: write       # required by actions/deploy-pages

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: render docs + leaderboard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync workspace + docs deps
        run: uv sync --all-packages --dev --group docs --prerelease=allow

      - name: Build mkdocs documentation site
        run: uv run mkdocs build --clean --site-dir _site

      - name: Build leaderboard into _site/leaderboard/
        run: |
          uv run bench leaderboard --build \
            --envelopes validation-runs/2026-05-18-multi-vendor-marathon/marathon/all \
            --out _site/leaderboard \
            --base-url /bench/leaderboard/

      - name: Smoke-check the rendered site
        run: |
          # Fail fast if either renderer produced an empty site.
          test -f _site/index.html                     # mkdocs index
          test -f _site/leaderboard/index.html         # leaderboard index
          test -f _site/leaderboard/static/site.css    # leaderboard CSS
          test -f _site/leaderboard/data/leaderboard.json
          n_html=$(find _site -name '*.html' | wc -l)
          echo "rendered HTML files: $n_html"
          test "$n_html" -ge 50

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
