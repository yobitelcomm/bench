name: deploy-pages

# Render the static leaderboard from the committed marathon corpus and deploy
# it to https://yobitelcomm.github.io/bench/. The mkdocs documentation site
# is intentionally NOT included yet — that's a separate ticket (mkdocs-material
# needs to be added to the dev deps and `docs_dir: .` needs to be fixed before
# `mkdocs build` works).
#
# Triggers:
#   * push to main when the leaderboard tool or the published corpus changes
#   * workflow_dispatch for manual re-deploys
#   * weekly schedule so the site rebuilds in case the corpus is grown by an
#     out-of-band publisher (e.g. the keyless-sign-marathon workflow uploading
#     to HF — we re-render so the static copies stay aligned).

on:
  push:
    branches: [main]
    paths:
      - "tools/leaderboard/**"
      - "validation-runs/2026-05-18-multi-vendor-marathon/marathon/all/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC

permissions:
  contents: read
  pages: write
  id-token: write       # required by actions/deploy-pages

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: render leaderboard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync workspace
        run: uv sync --all-packages --dev --prerelease=allow

      - name: Build leaderboard
        run: |
          mkdir -p _site
          uv run bench leaderboard --build \
            --envelopes validation-runs/2026-05-18-multi-vendor-marathon/marathon/all \
            --out _site \
            --base-url /bench/

      - name: Smoke-check the rendered site
        run: |
          # Fail fast if the renderer produced an empty site (would deploy a blank page otherwise).
          test -f _site/index.html
          test -f _site/static/site.css
          test -f _site/data/leaderboard.json
          n_html=$(find _site -name '*.html' | wc -l)
          echo "rendered HTML files: $n_html"
          test "$n_html" -ge 10

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
