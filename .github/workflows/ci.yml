name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --all-packages --dev --prerelease=allow
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --all-packages --dev --prerelease=allow
      - name: Mypy
        run: uv run mypy

  test:
    name: Test (Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --all-packages --dev --prerelease=allow
      - name: Pytest (unit + integration, CPU only)
        # --cov-branch keeps xdist workers' coverage shape consistent.
        run: uv run pytest -m "not gpu and not paid and not slow" --cov --cov-branch --cov-report=xml --cov-report=term
      - uses: codecov/codecov-action@v4
        if: success()
        with:
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: Security scans
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        # gitleaks-action@v2 is paid-license-gated; we use the upstream binary.
        run: |
          GITLEAKS_VERSION="8.21.2"
          curl -sSfL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks
        run: gitleaks detect --no-banner --redact --exit-code 1 --source .

  license-check:
    name: License compliance
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --all-packages --dev --prerelease=allow
      - name: Reject GPL / AGPL / SSPL dependencies
        # uvx runs pip-licenses ephemerally (it isn't a project dep).
        run: |
          uvx --from pip-licenses pip-licenses --python .venv/bin/python --format=json --output-file=licenses.json
          uv run python - <<'PY'
          import json, sys
          forbidden = {"GPL-3.0", "AGPL-3.0", "SSPL", "GPL-2.0", "AGPL-2.0"}
          with open("licenses.json") as f:
              licenses = json.load(f)
          violations = [pkg for pkg in licenses if pkg["License"] in forbidden]
          if violations:
              for v in violations:
                  print(f"::error::Forbidden license {v['License']} in {v['Name']}=={v['Version']}")
              sys.exit(1)
          print(f"Scanned {len(licenses)} packages, no forbidden licenses found.")
          PY
