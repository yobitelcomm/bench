site_name: InferenceBench
site_description: Vendor-neutral, hardware-fingerprinted, Sigstore-signed AI benchmarks.
site_url: https://yobitelcomm.github.io/bench
site_author: Yobitel team

repo_name: yobitelcomm/bench
repo_url: https://github.com/yobitelcomm/bench
edit_uri: edit/main/docs/

docs_dir: .
site_dir: ../site

theme:
  name: material
  palette:
    scheme: default
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Install: install.md
  - Quickstart: quickstart.md
  - 10-minute tour: tour.md
  - CLI reference:
      - Overview: cli/overview.md
      - bench audit: cli/bench-audit.md
      - bench bundle: cli/bench-bundle.md
      - bench cache: cli/bench-cache.md
      - bench ci: cli/bench-ci.md
      - bench compare: cli/bench-compare.md
      - bench cost: cli/bench-cost.md
      - bench diff: cli/bench-diff.md
      - bench doctor: cli/bench-doctor.md
      - bench export: cli/bench-export.md
      - bench fetch: cli/bench-fetch.md
      - bench history: cli/bench-history.md
      - bench leaderboard: cli/bench-leaderboard.md
      - bench list: cli/bench-list.md
      - bench matrix: cli/bench-matrix.md
      - bench plugin: cli/bench-plugin.md
      - bench profile: cli/bench-profile.md
      - bench publish: cli/bench-publish.md
      - bench replay: cli/bench-replay.md
      - bench run: cli/bench-run.md
      - bench schema: cli/bench-schema.md
      - bench summary: cli/bench-summary.md
      - bench verify: cli/bench-verify.md
      - bench watch: cli/bench-watch.md
  - Recipes:
      - Concurrency sweep: recipes/concurrency-sweep.md
      - Regression check: recipes/regression-check.md
      - Verify and replay: recipes/reproducibility.md
      - Cross-model comparison: recipes/cross-model.md
      - Audit a published corpus: recipes/audit.md
      - CI integration: recipes/ci-integration.md
      - Multi-vendor matrix: recipes/multi-vendor-matrix.md
      - Run in a container: recipes/docker.md
  - Concepts:
      - Signed envelope: concepts/envelope.md
      - Hardware fingerprinting: concepts/fingerprinting.md
      - Reproducibility: concepts/reproducibility.md
      - Pareto frontiers: concepts/pareto.md
      - Methodology: concepts/methodology.md
      - Vendor neutrality: concepts/vendor-neutrality.md
  - Plugins:
      - Overview: plugins/overview.md
      - llm.inference: plugins/llm-inference.md
  - Integrations:
      - Hugging Face Hub: integrations/huggingface-hub.md
      - GitHub Actions: integrations/github-actions.md
  - Community:
      - Contributing: community/contributing.md
      - Code of conduct: community/code-of-conduct.md
      - Security: community/security.md
      - Discussions: community/discussions.md
  - Reference:
      - Envelope schema: reference/envelope-schema.md
      - CLI reference: reference/cli-reference.md
  - FAQ: faq.md
  - Changelog: changelog.md
